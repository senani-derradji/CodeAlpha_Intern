name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          DATABASE_URL_ADMIN: "sqlite:///:memory:"
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DOMAIN: "http://localhost:8000"
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/google/callback"

        run: |
          cd api
          pytest tests.py -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Create reports directory
        run: |
          mkdir -p security-reports

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip-audit \
            --format=json \
            --output=security-reports/pip-audit.json

      - name: Run Bandit
        continue-on-error: true
        run: |
          bandit -r api \
            -f json \
            -o security-reports/bandit-report.json

      - name: Build Docker image
        run: |
          docker build -t url-shortener:scan .

      - name: Run Trivy SARIF scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "url-shortener:scan"
          format: "sarif"
          output: "security-reports/trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Run Trivy Table scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "url-shortener:scan"
          format: "table"
          output: "security-reports/trivy-report.txt"
          severity: "CRITICAL,HIGH"

      - name: Generate Summary
        continue-on-error: true
        run: |
          echo "# Security Scan Report" > security-reports/report.md
          echo "" >> security-reports/report.md

          echo "## Files Generated" >> security-reports/report.md
          echo "- pip-audit.json" >> security-reports/report.md
          echo "- bandit-report.json" >> security-reports/report.md
          echo "- trivy-results.sarif" >> security-reports/report.md
          echo "- trivy-report.txt" >> security-reports/report.md

      - name: Install Pandoc
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Generate PDF Report
        continue-on-error: true
        run: |
          pandoc security-reports/report.md \
            -o security-reports/security-report.pdf

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: security-reports/

  # ──────────────────────────────────────────────────────────────────────────

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest
            ${{ secrets.DOCKER_USERNAME }}/url-shortener:${{ github.sha }}

