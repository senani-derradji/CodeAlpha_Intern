name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          DATABASE_URL_ADMIN: "sqlite:///:memory:"
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DOMAIN: "http://localhost:8000"
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/google/callback"
        run: |
          cd api
          pytest tests.py -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Security Scan
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Create reports directory
        run: mkdir -p security-reports

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip-audit \
            --format=json \
            --output=security-reports/pip-audit.json

      - name: Run Bandit
        continue-on-error: true
        run: |
          bandit -r api \
            -f json \
            -o security-reports/bandit-report.json

      - name: Build Docker image
        run: docker build -t url-shortener:scan .

      # FIX 1: @v0 does not exist — pin to a real release tag
    #   - name: Run Trivy SARIF scan
    #     continue-on-error: true
    #     uses: aquasecurity/trivy-action@0.32.0
    #     with:
    #       image-ref: "url-shortener:scan"
    #       format: "sarif"
    #       output: "security-reports/trivy-results.sarif"
    #       severity: "CRITICAL,HIGH"

    #   - name: Run Trivy Table scan
    #     continue-on-error: true
    #     uses: aquasecurity/trivy-action@0.32.0
    #     with:
    #       image-ref: "url-shortener:scan"
    #       format: "table"
    #       output: "security-reports/trivy-report.txt"
    #       severity: "CRITICAL,HIGH"

      # FIX 4: embed actual scan results so the report isn't just a file list
      - name: Generate Markdown summary
        continue-on-error: true
        run: |
          echo "# Security Scan Report" > security-reports/report.md
          echo "" >> security-reports/report.md
          echo "## pip-audit" >> security-reports/report.md
          if [ -f security-reports/pip-audit.json ]; then
            count=$(python3 -c "import json,sys; d=json.load(open('security-reports/pip-audit.json')); print(len(d.get('dependencies',[])))" 2>/dev/null || echo "unknown")
            echo "Vulnerabilities found: $count" >> security-reports/report.md
          else
            echo "Report not generated." >> security-reports/report.md
          fi
          echo "" >> security-reports/report.md
          echo "## Bandit" >> security-reports/report.md
          if [ -f security-reports/bandit-report.json ]; then
            high=$(python3 -c "import json; d=json.load(open('security-reports/bandit-report.json')); print(d.get('metrics',{}).get('_totals',{}).get('SEVERITY.HIGH',0))" 2>/dev/null || echo "?")
            med=$(python3 -c "import json; d=json.load(open('security-reports/bandit-report.json')); print(d.get('metrics',{}).get('_totals',{}).get('SEVERITY.MEDIUM',0))" 2>/dev/null || echo "?")
            echo "HIGH: $high | MEDIUM: $med" >> security-reports/report.md
          else
            echo "Report not generated." >> security-reports/report.md
          fi
          echo "" >> security-reports/report.md
          echo "## Trivy" >> security-reports/report.md
          if [ -f security-reports/trivy-report.txt ]; then
            cat security-reports/trivy-report.txt >> security-reports/report.md
          else
            echo "Report not generated." >> security-reports/report.md
          fi

      # FIX 2: wkhtmltopdf is broken on Ubuntu 24 — use weasyprint instead
      - name: Install PDF tools
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint

      - name: Generate PDF report
        continue-on-error: true
        run: |
          pandoc security-reports/report.md \
            --pdf-engine=weasyprint \
            -o security-reports/security-report.pdf

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: security-reports/

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build & Push Docker Image
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # FIX 3: @v5 is outdated; @v6 is current. Added cache-from/cache-to
      #        to avoid rebuilding unchanged layers on every push.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/url-shortener:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/url-shortener:cache,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest
            ${{ secrets.DOCKER_USERNAME }}/url-shortener:${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy (Optional)
